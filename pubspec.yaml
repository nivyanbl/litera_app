name: litera
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.2
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.0.2
  intl: ^0.18.1
  http: ^1.6.0
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^2.0.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.2.0
  path_provider: ^2.1.5
  flutter_pdfview: ^1.4.4
  open_filex: ^4.7.0
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
